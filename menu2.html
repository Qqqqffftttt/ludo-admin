<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Ludo Game</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b4ea2;
color:white;
text-align:center;
}

/* MENUS */

.container{
padding-top:40px;
}

.hidden{
display:none;
}

.card{
width:280px;
margin:30px auto;
padding:20px;
background:#19aee6;
border-radius:20px;
font-size:30px;
font-weight:bold;
cursor:pointer;
}

.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
background:#19aee6;
border-radius:15px;
cursor:pointer;
font-size:24px;
}

.selected{
background:gold;
color:black;
}

.play{
display:block;
width:220px;
margin:30px auto 10px;
padding:15px;
background:limegreen;
border-radius:20px;
font-size:30px;
font-weight:bold;
cursor:pointer;
}

.continue{
display:block;
width:220px;
margin:10px auto;
padding:15px;
background:#5fa8ff;
border-radius:20px;
font-size:30px;
font-weight:bold;
cursor:pointer;
}

/* TOP BAR */

.top-bar{
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.top-btn{
width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:30px;
cursor:pointer;
background:#4de1e1;
color:white;
}

/* DICE */

.dice-area{
margin:20px auto;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

#turnText{
font-size:32px;
}

.dice-box{
width:100px;
height:100px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:black;
cursor:pointer;
}

/* BOARD */

.ludo-board{
width:750px;
height:750px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
background:white;
border:5px solid black;
}

.cell{
border:1px solid #999;
box-sizing:border-box;
position:relative;
}

/* TOKEN */

.token{

position:absolute;

width:70%;
height:70%;

top:15%;
left:15%;

border-radius:50%;

z-index:9999;

border:3px solid white;

box-sizing:border-box;

}

/* CENTER */

.center-triangle{
width:100%;
height:100%;
clip-path:polygon(
50% 50%,
0% 0%,
100% 0%
);
background:red;
position:absolute;
top:0;
left:0;
}

.center-green{
background:green;
transform:rotate(90deg);
}

.center-yellow{
background:yellow;
transform:rotate(180deg);
}

.center-blue{
background:blue;
transform:rotate(270deg);
}

/* POPUP */

.popup-bg{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
color:black;
padding:30px;
border-radius:20px;
text-align:center;
width:300px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="container">

<div class="card" onclick="openPlayerMenu()">
VS PLAYER
</div>

</div>

<!-- PLAYER MENU -->

<div id="playerMenu" class="container hidden">

<div class="btn"
style="display:block;width:120px;margin:auto"
onclick="goBack()">
⬅ BACK
</div>

<h1>No. Of Players</h1>

<div class="btn" onclick="selectPlayers(2)" id="p2">2P</div>
<div class="btn" onclick="selectPlayers(3)" id="p3">3P</div>
<div class="btn" onclick="selectPlayers(4)" id="p4">4P</div>

<div class="play" onclick="playGame()">
PLAY
</div>

<div class="continue">
CONTINUE
</div>

</div>

<!-- BOARD SCREEN -->

<div id="boardScreen" class="container hidden">

<div class="top-bar">

<button class="top-btn"
onclick="quitGame()">
⬅
</button>

<button class="top-btn">
🔊
</button>

</div>

<h1>LUDO BOARD</h1>

<h2 id="playerCount"></h2>

<div class="dice-area">

<h2 id="turnText">
RED PLAYER TURN
</h2>

<div class="dice-box"
onclick="rollDice()"
id="dice">
🎲
</div>

</div>

<div class="ludo-board" id="board"></div>

</div>

<!-- QUIT POPUP -->

<div id="quitPopup" class="popup-bg">

<div class="popup-box">

<h2>Quit Game?</h2>

<p>Do you want to quit the game?</p>

<button onclick="yesQuit()"
style="
padding:10px 20px;
font-size:20px;
margin:10px;
">
YES
</button>

<button onclick="noQuit()"
style="
padding:10px 20px;
font-size:20px;
margin:10px;
">
NO
</button>

</div>

</div>

<script>

/* VARIABLES */

let players=2;

let currentPlayer=0;

const playerNames=[
"RED",
"GREEN",
"YELLOW",
"BLUE"
];

let tokens=[];

/* OUTER PATH */

const path=[

[6,1],[6,2],[6,3],[6,4],[6,5],
[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],

[0,7],

[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],

[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],

[7,14],

[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],

[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],

[14,7],

[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],

[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],

[7,0]

];

/* MENU */

function openPlayerMenu(){

document.getElementById("home")
.classList.add("hidden");

document.getElementById("playerMenu")
.classList.remove("hidden");

}

function selectPlayers(n){

players=n;

document.querySelectorAll(".btn")
.forEach(btn=>{
btn.classList.remove("selected");
});

document.getElementById("p"+n)
.classList.add("selected");

}

/* PLAY */

function playGame(){

document.getElementById("home")
.classList.add("hidden");

document.getElementById("playerMenu")
.classList.add("hidden");

document.getElementById("boardScreen")
.classList.remove("hidden");

document.getElementById("playerCount")
.innerHTML=
players+" Players Selected";

createTokens();

}

/* BACK */

function goBack(){

document.getElementById("playerMenu")
.classList.add("hidden");

document.getElementById("home")
.classList.remove("hidden");

}

/* QUIT */

function quitGame(){

document.getElementById("quitPopup")
.style.display="flex";

}

function noQuit(){

document.getElementById("quitPopup")
.style.display="none";

}

function yesQuit(){

location.reload();

}

/* CREATE TOKENS */

function createTokens(){

tokens=[];

/* RED */

tokens.push({
color:"red",
position:-1,
start:0,
home:[1,1]
});

tokens.push({
color:"red",
position:-1,
start:0,
home:[1,4]
});

tokens.push({
color:"red",
position:-1,
start:0,
home:[4,1]
});

tokens.push({
color:"red",
position:-1,
start:0,
home:[4,4]
});

/* GREEN */

if(players>=2){

tokens.push({
color:"green",
position:-1,
start:13,
home:[1,10]
});

tokens.push({
color:"green",
position:-1,
start:13,
home:[1,13]
});

tokens.push({
color:"green",
position:-1,
start:13,
home:[4,10]
});

tokens.push({
color:"green",
position:-1,
start:13,
home:[4,13]
});

}

/* YELLOW */

if(players>=3){

tokens.push({
color:"yellow",
position:-1,
start:26,
home:[10,10]
});

tokens.push({
color:"yellow",
position:-1,
start:26,
home:[10,13]
});

tokens.push({
color:"yellow",
position:-1,
start:26,
home:[13,10]
});

tokens.push({
color:"yellow",
position:-1,
start:26,
home:[13,13]
});

}

/* BLUE */

if(players>=4){

tokens.push({
color:"blue",
position:-1,
start:39,
home:[10,1]
});

tokens.push({
color:"blue",
position:-1,
start:39,
home:[10,4]
});

tokens.push({
color:"blue",
position:-1,
start:39,
home:[13,1]
});

tokens.push({
color:"blue",
position:-1,
start:39,
home:[13,4]
});

}

drawTokens();

}

/* DRAW TOKENS */

function drawTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

tokens.forEach(token=>{

let row,col;

/* HOME */

if(token.position==-1){

row=token.home[0];
col=token.home[1];

}

/* MOVING */

else{

let step=
(token.start+token.position)%path.length;

row=path[step][0];
col=path[step][1];

}

let cell=
document.querySelector(
`.cell[data-row='${row}'][data-col='${col}']`
);

if(cell){

let t=
document.createElement("div");

t.className="token";

t.style.background=
token.color;

cell.appendChild(t);

}

});

}

/* DICE */

function rollDice(){

let number=
Math.floor(Math.random()*6)+1;

document.getElementById("dice")
.innerHTML=number;

let playerColor=
playerNames[currentPlayer]
.toLowerCase();

/* FIND PLAYER TOKENS */

let playerTokens=
tokens.filter(
t=>t.color==playerColor
);

/* FIRST TOKEN */

let token=
playerTokens[0];

/* OPEN */

if(number==6 && token.position==-1){

token.position=0;

}

/* MOVE */

else if(token.position>=0){

token.position+=number;

if(token.position>=path.length){
token.position=
path.length-1;
}

}

drawTokens();

/* NEXT TURN */

if(number!=6){

currentPlayer++;

if(currentPlayer>=players){
currentPlayer=0;
}

}

document.getElementById("turnText")
.innerHTML=
playerNames[currentPlayer]
+" PLAYER TURN";

}

/* BOARD */

createBoard();

function createBoard(){

const board=
document.getElementById("board");

board.innerHTML="";

for(let row=0;row<15;row++){

for(let col=0;col<15;col++){

let cell=
document.createElement("div");

cell.className="cell";

cell.setAttribute("data-row",row);
cell.setAttribute("data-col",col);

cell.style.background="white";

/* RED HOME */

if(row<6 && col<6){
cell.style.background="red";
}

/* GREEN HOME */

if(row<6 && col>8){
cell.style.background="green";
}

/* BLUE HOME */

if(row>8 && col<6){
cell.style.background="blue";
}

/* YELLOW HOME */

if(row>8 && col>8){
cell.style.background="yellow";
}

/* INNER WHITE */

if(
(row>=1 && row<=4 && col>=1 && col<=4) ||

(row>=1 && row<=4 && col>=10 && col<=13) ||

(row>=10 && row<=13 && col>=1 && col<=4) ||

(row>=10 && row<=13 && col>=10 && col<=13)
){
cell.style.background="white";
}

/* WHITE PATH */

if(col>=6 && col<=8){
cell.style.background="white";
}

if(row>=6 && row<=8){
cell.style.background="white";
}

/* HOME LANE */

if(row==7 && col>=1 && col<=5){
cell.style.background="red";
}

if(col==7 && row>=1 && row<=5){
cell.style.background="green";
}

if(row==7 && col>=9 && col<=13){
cell.style.background="yellow";
}

if(col==7 && row>=9 && row<=13){
cell.style.background="blue";
}

/* ENTRY */

if(row==6 && col==1){
cell.style.background="red";
}

if(row==1 && col==8){
cell.style.background="green";
}

if(row==8 && col==13){
cell.style.background="yellow";
}

if(row==13 && col==6){
cell.style.background="blue";
}

/* SAFE STARS */

if(
(row==6 && col==1) ||
(row==1 && col==8) ||
(row==8 && col==13) ||
(row==13 && col==6)
){

cell.innerHTML="⭐";

cell.style.display="flex";
cell.style.justifyContent="center";
cell.style.alignItems="center";
cell.style.fontSize="20px";

}

/* CENTER */

if(row==7 && col==7){

cell.innerHTML=`

<div class="center-triangle"></div>

<div class="center-triangle center-green"></div>

<div class="center-triangle center-yellow"></div>

<div class="center-triangle center-blue"></div>

`;

cell.style.position="relative";

cell.style.background="white";

}

board.appendChild(cell);

}

}

}

</script>

</body>
</html>
